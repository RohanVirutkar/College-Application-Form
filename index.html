<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>College Application Form</h1>
        <p>Fill out the form carefully to apply for admission.</p>

        <form action="#">

            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" rows="4" placeholder="Enter your address"></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="City">
                </div>

                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" placeholder="State">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="course">Course Applying For</label>
                    <select id="course" required>
                        <option value="">Select Course</option>
                        <option>B.Tech</option>
                        <option>BCA</option>
                        <option>B.Sc</option>
                        <option>BBA</option>
                        <option>MCA</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="marks">12th Percentage</label>
                    <input type="number" id="marks" placeholder="Enter Percentage">
                </div>
            </div>

            <div class="form-group">
                <label for="document">Upload Marksheet</label>
                <input type="file" id="document">
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" required>
                    I hereby declare that all information provided is correct.
                </label>
            </div>

            <button type="submit">Submit Application</button>

        </form>
    </div>

</body>
</html>
